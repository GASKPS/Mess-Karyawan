<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mess Karyawan - PT KPS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
/* ================== MINI SPLASH SCREEN ================== */
#splash-screen{
  position:fixed;
  inset:0;
  background: var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  flex-direction:column;
  pointer-events:none;
  transition: opacity 0.5s ease;
}
#splash-screen img{
  height:80px;
  object-fit:contain;
  margin-bottom:10px;
}
#splash-screen span{
  font-size:14px;
  color: var(--text-muted);
}

/* ================== VARIABLES & GENERAL ================== */
:root{
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #1e293b;
  --text-muted: #64748b;
  --primary: #1e3a8a;
  --border: #e2e8f0;
  --hover: rgba(30,58,138,.05);
  --badge-primary: #1e40af;
  --badge-secondary: #64748b;
  --input-bg: #ffffff;
}

body.dark{
  --bg: #121212;
  --card: #1e1e1e;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --primary: #60a5fa;
  --border: #2d2d2d;
  --hover: rgba(96,165,250,0.08);
  --badge-primary: #3b82f6;
  --badge-secondary: #475569;
  --input-bg: #252525;
}

body { 
  background: var(--bg); 
  color: var(--text); 
  min-height:100vh; 
  padding:40px 15px; 
  display:flex; 
  justify-content:center; 
  align-items:flex-start; 
  font-family:"Plus Jakarta Sans", "Segoe UI",sans-serif; 
  transition: background 0.3s, color 0.3s;
}

.card { 
  max-width:950px; 
  width:100%; 
  background:var(--card); 
  border-radius:24px; 
  padding:35px; 
  box-shadow:0 10px 40px rgba(0,0,0,.08); 
  position:relative; 
  border: 1px solid var(--border);
  text-align:center; 
}

h2 { color:var(--primary); margin-bottom:4px; font-weight: 800; letter-spacing: -0.5px; }
.subtitle { font-size:14px; color:var(--text-muted); margin-bottom:15px; }

.dark-toggle { position: absolute; top: 25px; right: 25px; }
.eclipse { position:relative; width:22px; height:22px; display:inline-block; }
.eclipse .sun { position:absolute; inset:0; border-radius:50%; background:#facc15; box-shadow:0 0 6px rgba(250,204,21,.8); transition:transform 0.4s ease; }
.eclipse .moon { position:absolute; inset:0; border-radius:50%; background:#1e1e1e; transform:translateX(-26px); transition:transform 0.4s ease; }
body.dark .eclipse .moon { transform:translateX(0); box-shadow:0 0 6px #60a5fa; }

.form-control { border-radius:12px; transition: all 0.2s ease; background-color: var(--input-bg); color: var(--text); border: 1px solid var(--border); padding: 12px 16px; }
.form-control:focus { background-color: var(--input-bg); color: var(--text); border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1); }

/* Tombol Elegan Baru */
.btn-elegant {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 10px 24px;
    font-weight: 600;
    font-size: 15px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(30, 58, 138, 0.15);
}

.btn-elegant:hover {
    filter: brightness(1.1);
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(30, 58, 138, 0.2);
    color: white;
}

.btn-elegant i { font-size: 18px; }

.table-container{ max-height:400px; overflow:auto; border-radius:16px; background:var(--card); border: 1px solid var(--border); margin-bottom:10px; }
table { width:100%; border-collapse:collapse; color:var(--text); }
th { position:sticky; top:0; background:var(--primary); color:#fff; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; padding: 15px 10px; z-index: 10; border: none; }
body.dark th { color: #111; font-weight: 700; background: var(--primary); }

td { padding:14px 10px; font-size:14px; border-bottom: 1px solid var(--border); }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--hover); }

#logo-web { height: 75px; margin-bottom:20px; object-fit: contain; }
.footer { font-size:12px; color:var(--text-muted); margin-top:25px; }

.badge { padding: 6px 12px; border-radius: 8px; font-weight: 600; font-size: 12px; }
.badge.bg-primary { background-color: var(--badge-primary) !important; }
.badge.bg-secondary { background-color: var(--badge-secondary) !important; }

.nav-pills .nav-link { color: var(--text-muted); font-weight: 600; border-radius: 12px; padding: 10px 20px; transition: 0.3s; }
.nav-pills .nav-link.active { background-color: var(--primary); color: white; box-shadow: 0 4px 10px rgba(30, 58, 138, 0.15); }
</style>
</head>
<body>

<div id="splash-screen">
  <img src="logo-perusahaan.png" alt="Logo">
  <span>Memuat Portal...</span>
</div>

<div class="card">
  <div class="dark-toggle">
    <button class="btn btn-outline-secondary btn-sm rounded-pill border-0" onclick="toggleDark()">
      <span class="eclipse"><span class="sun"></span><span class="moon"></span></span>
    </button>
  </div>

  <img id="logo-web" src="logo-perusahaan.png" alt="Logo">

  <h2>Mess Karyawan</h2>
  
  <div id="last-update" class="mb-4 small opacity-75"><i class="bi bi-clock-history"></i> Update Terakhir: 4 Maret 2026</div>

  <ul class="nav nav-pills justify-content-center mb-4 p-1 bg-light rounded-pill d-inline-flex mx-auto" style="background: rgba(0,0,0,0.03) !important;">
    <li class="nav-item">
      <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab1">Pencarian Cepat</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab2">Filter Kamar</button>
    </li>
  </ul>

  <div class="tab-content">
    <div class="tab-pane fade show active" id="tab1">
      <div class="mb-4 position-relative">
        <input id="cariNik" class="form-control" placeholder="Cari NIK atau Nama Lengkap...">
      </div>
      <div class="d-flex justify-content-between align-items-center mb-3">
        <span class="text-muted small fw-medium">Hasil Pencarian</span>
        <button class="btn btn-link btn-sm text-decoration-none text-primary fw-bold" onclick="screenshotTabel('tab1')"><i class="bi bi-download me-1"></i> Simpan Gambar</button>
      </div>
      <div id="screenshot-area-tab1">
        <div class="table-container">
          <table>
            <thead>
              <tr><th>NIK</th><th>Nama</th><th>Dept</th><th>Jabatan</th><th>Blok</th><th>Kamar</th><th>Lokasi</th></tr>
            </thead>
            <tbody id="hasilNik"><tr><td colspan="7" class="py-5 text-muted small">Mulai ketik untuk mencari data...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="tab-pane fade" id="tab2">
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <select id="cariLokasi" class="form-control">
            <option value="">Pilih Lokasi</option>
            <option value="SURYA RESIDENCE (P2)">SURYA RESIDENCE (P2)</option>
            <option value="MENTARI">MENTARI</option>
            <option value="PELANGI">PELANGI</option>
          </select>
        </div>
        <div class="col-md-4"><input id="cariBlock" class="form-control" placeholder="Blok"></div>
        <div class="col-md-4"><input id="cariKamar" class="form-control" placeholder="No. Kamar"></div>
      </div>
      
      <div class="text-center mb-4">
          <button class="btn-elegant" onclick="cariBlockKamar()">
              <i class="bi bi-funnel"></i> Tampilkan Data
          </button>
      </div>
      
      <div class="d-flex justify-content-between align-items-center mb-3">
        <span class="text-muted small fw-medium">Hasil Filter</span>
        <button class="btn btn-link btn-sm text-decoration-none text-primary fw-bold" onclick="screenshotTabel('tab2')"><i class="bi bi-download me-1"></i> Simpan Gambar</button>
      </div>
      <div id="screenshot-area-tab2">
        <div class="table-container">
          <table>
            <thead>
              <tr><th>NIK</th><th>Nama</th><th>Dept</th><th>Jabatan</th><th>Blok</th><th>Kamar</th><th>Lokasi</th></tr>
            </thead>
            <tbody id="hasilBlock"><tr><td colspan="7" class="py-5 text-muted small">Lengkapi filter di atas...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="footer opacity-50">© 2026 PT Karunia Permai Sentosa</div>
</div>

<script>
window.addEventListener('load', ()=>{
  setTimeout(()=>{
    const splash = document.getElementById('splash-screen');
    splash.style.opacity = '0';
    setTimeout(()=> splash.style.display='none',500);
  },800); 
});

function toggleDark(){ 
  document.body.classList.toggle("dark"); 
  localStorage.setItem("dark",document.body.classList.contains("dark")?"on":"off"); 
}
if(localStorage.getItem("dark")==="on") document.body.classList.add("dark");

const supabaseClient = supabase.createClient(
  "https://ufljifxnhipnsrqktrti.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmbGppZnhuaGlwbnNycWt0cnRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwMzMzMzEsImV4cCI6MjA4NDYwOTMzMX0.ueLqkq2n-x3QUMyB59avZeVEs74GmRt8r3Sr8NNEB9A"
);

function render(tbody, data){
  if(!data || !data.length){
    tbody.innerHTML=`<tr><td colspan="7" class="py-5 text-muted">⚠️ Tidak ada data yang ditemukan</td></tr>`;
    return;
  }
  tbody.innerHTML=data.map(r=>`
    <tr>
      <td class="fw-bold small">${r.nik??"-"}</td>
      <td class="text-start">${r.nama??"-"}</td>
      <td class="small">${r.department??"-"}</td>
      <td class="small">${r.jabatan??"-"}</td>
      <td><span class="badge bg-primary">${r.block??"-"}</span></td>
      <td><span class="badge bg-secondary">${r.no_kamar??"-"}</span></td>
      <td class="small text-muted">${r.lokasi_hunian??"-"}</td>
    </tr>`).join("");
}

document.getElementById("cariNik").addEventListener("input", async (e)=>{
  const v = e.target.value.trim();
  if(v.length < 2) return;
  const {data} = await supabaseClient.from("Karyawan")
    .select("*")
    .or(`nik.ilike.%${v}%,nama.ilike.%${v}%`)
    .limit(10);
  render(document.getElementById("hasilNik"), data);
});

async function cariBlockKamar(){
  const loc = document.getElementById("cariLokasi").value;
  const blk = document.getElementById("cariBlock").value.trim();
  const kmr = document.getElementById("cariKamar").value.trim();

  if(!loc || !blk || !kmr) {
    alert("⚠️ Mohon isi semua filter: Lokasi, Blok, dan Nomor Kamar.");
    return;
  }

  let query = supabaseClient.from("Karyawan").select("*");
  query = query.ilike("lokasi_hunian", `%${loc}%`);
  query = query.ilike("block", `%${blk}%`);
  query = query.eq("no_kamar", kmr);

  const {data} = await query;
  render(document.getElementById("hasilBlock"), data);
}

function screenshotTabel(tab){
  const area = document.getElementById("screenshot-area-"+tab);
  const tableContainer = area.querySelector(".table-container");
  const originalMaxHeight = tableContainer.style.maxHeight;

  tableContainer.style.maxHeight = "none";
  setTimeout(()=>{
    html2canvas(area, {scale:2, useCORS:true, backgroundColor: document.body.classList.contains('dark') ? '#1e1e1e' : '#ffffff'}).then(canvas=>{
      const link = document.createElement("a");
      link.download = `MessKPS_${Date.now()}.png`;
      link.href = canvas.toDataURL();
      link.click();
      tableContainer.style.maxHeight = originalMaxHeight;
    });
  },200);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
