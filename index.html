<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mess Karyawan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
#splash-screen{
position:fixed;
inset:0;
background: rgba(255,255,255,0.8);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
flex-direction:column;
pointer-events:none;
transition: opacity 0.5s ease;
}
#splash-screen img{
height:80px;
object-fit:contain;
margin-bottom:10px;
}
#splash-screen span{
font-size:14px;
color:#555;
}

:root{
--bg:#f1f3f6;
--card:#ffffff;
--text:#111827;
--text-muted:#6b7280;
--primary:#1e3a8a;
--border:#ddd;
--hover:rgba(30,58,138,.05);
--badge-primary:#0d6efd;
--badge-secondary:#6c757d;
}

body.dark{
--bg:#121212;
--card:#1e1e1e;
--text:#ffffff;
--text-muted:#cccccc;
--primary:#4dabf7;
--border:#2c2c2c;
--hover:rgba(77,171,247,0.08);
--badge-primary:#3b82f6;
--badge-secondary:#6b7280;
}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
padding:40px 15px;
display:flex;
justify-content:center;
align-items:flex-start;
font-family:"Segoe UI",sans-serif;
transition: background .3s,color .3s;
}

.card{
max-width:950px;
width:100%;
background:var(--card);
border-radius:16px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;
}

h2{color:var(--primary)}
.subtitle{font-size:14px;color:var(--text-muted)}
.dark-toggle{text-align:right;margin-bottom:10px}

.form-control,.btn{
height:45px;
border-radius:10px;
}

.table-container{
max-height:380px;
overflow:auto;
border-radius:10px;
background:var(--card);
box-shadow:0 4px 12px rgba(0,0,0,.1);
margin-bottom:10px;
}

table{width:100%;border-collapse:collapse}
th{
position:sticky;
top:0;
background:var(--primary);
color:#fff;
}

th,td{
border:1px solid var(--border);
padding:8px;
font-size:14px;
}

tbody tr:hover{background:var(--hover)}
tbody tr:nth-child(even){background:rgba(0,0,0,.03)}
body.dark tbody tr:nth-child(even){background:rgba(255,255,255,.05)}

#logo-web{
height:80px;
margin-bottom:10px;
object-fit:contain;
}

.footer{
font-size:12px;
color:var(--text-muted);
margin-top:20px;
}
</style>
</head>

<body>

<div id="splash-screen">
<img src="logo-perusahaan.png">
<span>Loading...</span>
</div>

<div class="card">

<div class="dark-toggle">
<button class="btn btn-outline-primary btn-sm" onclick="toggleDark()">Dark</button>
</div>

<img id="logo-web" src="logo-perusahaan.png">

<h2>Mess Karyawan</h2>
<div class="subtitle">Sistem Informasi Penghuni Mess</div>
<hr>

<div id="last-update">Update database terakhir: 4 Maret 2026 17:55 WIT</div>

<ul class="nav nav-tabs justify-content-center mb-3">
<li class="nav-item">
<button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab1">NIK / Nama</button>
</li>
<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab2">Block / No Kamar</button>
</li>
</ul>

<div class="tab-content">

<div class="tab-pane fade show active" id="tab1">

<div class="row g-2 mb-3">
<div class="col-md-12">
<input id="cariNik" class="form-control" placeholder="Cari NIK atau Nama">
</div>
</div>

<div class="d-flex justify-content-end mb-2">
<button class="btn btn-outline-primary btn-sm" onclick="screenshotTabel('tab1')">
<i class="bi bi-camera"></i> Screenshot
</button>
</div>

<div id="screenshot-area-tab1">
<div class="table-container">
<table>
<thead>
<tr>
<th>NIK</th>
<th>Nama</th>
<th>Dept</th>
<th>Jabatan</th>
<th>Block</th>
<th>No Kamar</th>
<th>Lokasi</th>
</tr>
</thead>
<tbody id="hasilNik">
<tr><td colspan="7" class="text-center text-muted">Cari data terlebih dahulu</td></tr>
</tbody>
</table>
</div>
</div>

</div>

<div class="tab-pane fade" id="tab2">

<div class="row g-2 mb-3">

<div class="col-md-4">
<select id="cariLokasi" class="form-control">
<option value="">Pilih Lokasi</option>
<option value="SURYA RESIDENCE (P2)">SURYA RESIDENCE (P2)</option>
<option value="MENTARI">MENTARI</option>
<option value="PELANGI">PELANGI</option>
</select>
</div>

<div class="col-md-4">
<input id="cariBlock" class="form-control" placeholder="Block">
</div>

<div class="col-md-4">
<input id="cariKamar" class="form-control" placeholder="No Kamar">
</div>

</div>

<div class="row mb-3">
<div class="col-md-12 d-grid">
<button class="btn btn-primary" onclick="cariBlockKamar()">
<i class="bi bi-search"></i> Cari
</button>
</div>
</div>

<div class="d-flex justify-content-end mb-2">
<button class="btn btn-outline-primary btn-sm" onclick="screenshotTabel('tab2')">
<i class="bi bi-camera"></i> Screenshot
</button>
</div>

<div id="screenshot-area-tab2">
<div class="table-container">
<table>
<thead>
<tr>
<th>NIK</th>
<th>Nama</th>
<th>Dept</th>
<th>Jabatan</th>
<th>Block</th>
<th>No Kamar</th>
<th>Lokasi</th>
</tr>
</thead>
<tbody id="hasilBlock">
<tr><td colspan="7" class="text-center text-muted">Cari data terlebih dahulu</td></tr>
</tbody>
</table>
</div>
</div>

</div>
</div>

<div class="footer">
© 2026 PT Karunia Permai Sentosa • Internal System
</div>

</div>

<script>

window.addEventListener('load',()=>{
setTimeout(()=>{
const splash=document.getElementById('splash-screen');
splash.style.opacity='0';
setTimeout(()=> splash.style.display='none',500);
},1000);
});

if(localStorage.getItem("dark")==="on") document.body.classList.add("dark");

function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("dark",document.body.classList.contains("dark")?"on":"off");
}

const supabaseClient = supabase.createClient(
"https://ufljifxnhipnsrqktrti.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmbGppZnhuaGlwbnNycWt0cnRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwMzMzMzEsImV4cCI6MjA4NDYwOTMzMX0.ueLqkq2n-x3QUMyB59avZeVEs74GmRt8r3Sr8NNEB9A"
);

const cariNik=document.getElementById("cariNik");
const hasilNik=document.getElementById("hasilNik");

const cariLokasi=document.getElementById("cariLokasi");
const cariBlock=document.getElementById("cariBlock");
const cariKamar=document.getElementById("cariKamar");
const hasilBlock=document.getElementById("hasilBlock");

function render(tbody,data){

if(!data || !data.length){
tbody.innerHTML=`<tr><td colspan="7" class="text-center text-muted">Data tidak ditemukan</td></tr>`;
return;
}

tbody.innerHTML=data.map(r=>`
<tr>
<td>${r.nik??"-"}</td>
<td>${r.nama??"-"}</td>
<td>${r.department??"-"}</td>
<td>${r.jabatan??"-"}</td>
<td>${r.block??"-"}</td>
<td>${r.no_kamar??"-"}</td>
<td>${r.lokasi_hunian??"-"}</td>
</tr>
`).join("");

}

async function cariNikNama(){

const {data} = await supabaseClient
.from("Karyawan")
.select("*")
.or(`nik.ilike.%${cariNik.value}%,nama.ilike.%${cariNik.value}%`)
.limit(10);

render(hasilNik,data);

}

cariNik.addEventListener("input",cariNikNama);

async function cariBlockKamar(){

let query = supabaseClient
.from("Karyawan")
.select("*")
.limit(10);

if(cariLokasi.value)
query=query.ilike("lokasi_hunian",`%${cariLokasi.value.trim()}%`);

if(cariBlock.value)
query=query.ilike("block",`%${cariBlock.value.trim()}%`);

if(cariKamar.value)
query=query.ilike("no_kamar",`%${cariKamar.value.trim()}%`);

const {data} = await query;

render(hasilBlock,data);

}

function screenshotTabel(tab){

const area=document.getElementById("screenshot-area-"+tab);
const tableContainer=area.querySelector(".table-container");

const originalMaxHeight=tableContainer.style.maxHeight;
const originalOverflow=tableContainer.style.overflow;

tableContainer.style.maxHeight="none";
tableContainer.style.overflow="visible";

setTimeout(()=>{

html2canvas(area,{
scale:1.3,
useCORS:true,
backgroundColor:null
}).then(canvas=>{

const now=new Date();

const date=
now.getFullYear()+"-"+
String(now.getMonth()+1).padStart(2,"0")+"-"+
String(now.getDate()).padStart(2,"0");

const time=
String(now.getHours()).padStart(2,"0")+"-"+
String(now.getMinutes()).padStart(2,"0")+"-"+
String(now.getSeconds()).padStart(2,"0");

const link=document.createElement("a");

link.download=`mess_karyawan_${date}_${time}.png`;
link.href=canvas.toDataURL("image/png");

link.click();

tableContainer.style.maxHeight=originalMaxHeight;
tableContainer.style.overflow=originalOverflow;

});

},200);

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
